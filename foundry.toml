[profile.default]
src = "foundry/src"
out = "foundry/out"
test = "foundry/test"
script = "foundry/script"
libs = ["node_modules", "foundry/lib"]
solc_version = "0.8.25"
evm_version = "cancun"
auto_detect_remappings = false
code_size_limit = 100000
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
